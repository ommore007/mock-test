<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>रेल्वे भरती सराव प्रश्नसंच</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; display: flex; justify-content: center; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .q-text { font-size: 1.2rem; margin-bottom: 25px; font-weight: bold; color: #fb923c; }
        button { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: #334155; color: white; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ea580c; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="text-align:center;">रेल्वे भरती सराव (४० प्रश्न)</h3>
    <hr style="border: 0; border-top: 1px solid #475569; margin-bottom: 20px;">
    <div id="q-text" class="q-text">प्रश्न लोड होत आहे...</div>
    <div id="options"></div>
</div>

<script>
    const questions = [
        { q: "भारतीय रेल्वेची स्थापना कधी झाली?", a: ["१८५३", "१८५७", "१९०५", "१९२०"], c: 0 },
        { q: "जगातील सर्वात लांब रेल्वे मार्ग कोणता?", a: ["ट्रान्स-सायबेरियन", "युनियन पॅसिफिक", "भारतीय रेल्वे", "काही नाही"], c: 0 },
        { q: "भारतीय रेल्वेचे मुख्यालय कुठे आहे?", a: ["मुंबई", "नवी दिल्ली", "कोलकाता", "चेन्नई"], c: 1 },
        { q: "रेल्वे इंजिनचा शोध कोणी लावला?", a: ["जॉर्ज स्टीफनसन", "थॉमस अल्वा एडिसन", "जेम्स वॅट", "काही नाही"], c: 0 },
        { q: "भारतातील पहिली रेल्वे कोठून कोठे धावली?", a: ["मुंबई ते ठाणे", "पुणे ते मुंबई", "दिल्ली ते आग्रा", "नागपूर ते मुंबई"], c: 0 },
        { q: "रेल्वे सिग्नलवर लाल रंगाचा वापर का करतात?", a: ["कारण लाल रंगाची तरंगलांबी जास्त असते", "कारण तो सुंदर दिसतो", "कारण तो महाग आहे", "काही नाही"], c: 0 },
        { q: "अंकगणित: ताशी ६० किमी वेगाने धावणारी रेल्वे ३ तासात किती अंतर कापेल?", a: ["१८० किमी", "१२० किमी", "२०० किमी", "१५० किमी"], c: 0 },
        { q: "भारतीय रेल्वेचे जनक कोणाला म्हणतात?", a: ["लॉर्ड डलहौसी", "लॉर्ड रिपन", "लॉर्ड माऊंटबॅटन", "काही नाही"], c: 0 },
        { q: "बुद्धिमत्ता: ५, १०, २०, ४०, ८०, ?", a: ["१००", "१२०", "१६०", "१५०"], c: 2 },
        { q: "रेल्वे कोच फॅक्टरी कुठे आहे?", a: ["कपूरथला", "मुंबई", "नागपूर", "पुणे"], c: 0 },
        { q: "विद्युत रेल्वेचे जनक कोण?", a: ["मायकल फॅराडे", "थॉमस एडिसन", "जेम्स वॅट", "काही नाही"], c: 0 },
        { q: "अंकगणित: १००० चे १०% किती?", a: ["१००", "२००", "५०", "१५०"], c: 0 },
        { q: "भारतातील सर्वात जलद रेल्वे कोणती?", a: ["वंदे भारत", "शताब्दी", "राजधानी", "दुरंतो"], c: 0 },
        { q: "रेल्वे कर्मचारी दिन कधी असतो?", a: ["१६ एप्रिल", "१५ ऑगस्ट", "२६ जानेवारी", "१ मे"], c: 0 },
        { q: "बुद्धिमत्ता: A=१, B=२ तर F=?", a: ["५", "६", "७", "८"], c: 1 },
        { q: "रेल्वेमध्ये 'Gauge' म्हणजे काय?", a: ["रुळांमधील अंतर", "डब्यांची लांबी", "इंजिनचा वेग", "काही नाही"], c: 0 },
        { q: "भारतीय रेल्वे कोणत्या मंत्रालयांतर्गत येते?", a: ["रेल्वे मंत्रालय", "वाहतूक मंत्रालय", "गृह मंत्रालय", "काही नाही"], c: 0 },
        { q: "अंकगणित: एका रेल्वेची लांबी ५०० मीटर आहे, ती ५०० मीटर लांब पुलाला किती वेळात पार करेल (वेग ५० किमी/तास)?", a: ["७२ सेकंद", "६० सेकंद", "८० सेकंद", "५० सेकंद"], c: 0 },
        { q: "कोणते शहर 'रेल्वेचे हृदय' मानले जाते?", a: ["मुंबई", "नवी दिल्ली", "मुघलसराय", "नागपूर"], c: 2 },
        { q: "बुद्धिमत्ता: जर 'TRAIN' = 'UQBJO', तर 'BUS' = ?", a: ["CVT", "DVT", "CUT", "DUT"], c: 0 },
        { q: "भारतीय रेल्वेचा शुभंकर (Mascot) कोणता आहे?", a: ["भोलू हत्ती", "वाघ", "सिंह", "काही नाही"], c: 0 },
        { q: "रेल्वेचा बोर्ड कधी स्थापन झाला?", a: ["१९०५", "१९२०", "१९४७", "१९५०"], c: 0 },
        { q: "अंकगणित: ५० चे अर्धे किती?", a: ["२५", "२०", "३०", "१५"], c: 0 },
        { q: "इलेक्ट्रिक रेल्वेची सुरुवात भारतात कधी झाली?", a: ["१९२५", "१९३०", "१९४०", "१९५०"], c: 0 },
        { q: "बुद्धिमत्ता: १८, २७, ३६, ४५, ?", a: ["५४", "५०", "५२", "५५"], c: 0 },
        { q: "रेल्वेचा 'व्हील आणि ॲक्सल' कारखाना कुठे आहे?", a: ["बेंगलोर", "मुंबई", "पुणे", "नागपूर"], c: 0 },
        { q: "भारतीय रेल्वेचे एकूण किती झोन आहेत?", a: ["१८", "१६", "१५", "२०"], c: 0 },
        { q: "अंकगणित: ७ चा वर्ग किती?", a: ["४९", "४२", "५६", "३६"], c: 0 },
        { q: "सर्वात जास्त रेल्वे मार्ग कोणत्या देशात आहेत?", a: ["अमेरिका", "चीन", "भारत", "रशिया"], c: 0 },
        { q: "बुद्धिमत्ता: जर एका रांगेत रेल्वे १२ वी आहे, तर पुढून ३ री असल्यास एकूण किती रेल्वे आहेत?", a: ["१४", "१५", "१३", "१६"], c: 0 },
        { q: "रेल्वेमध्ये 'Pantry Car' कशासाठी असते?", a: ["जेवण", "तिकीट", "वेळ", "काही नाही"], c: 0 },
        { q: "भारतातील पहिली मेट्रो कुठे सुरू झाली?", a: ["कोलकाता", "मुंबई", "दिल्ली", "पुणे"], c: 0 },
        { q: "अंकगणित: ५ x ८ x ० = ?", a: ["०", "४०", "१", "५"], c: 0 },
        { q: "रेल्वेच्या डब्यांवर काय लिहिलेले असते?", a: ["ICF/LHB", "कंपनीचे नाव", "गाडीचा नंबर", "काही नाही"], c: 0 },
        { q: "बुद्धिमत्ता: जर 'RED' = 'TGE', तर 'BLUE' = ?", a: ["DNWG", "DNVG", "CMWG", "काही नाही"], c: 0 },
        { q: "रेल्वेचे ब्रीदवाक्य काय आहे?", a: ["राष्ट्र की जीवन रेखा", "गतिमान भारत", "सुरक्षित प्रवास", "काही नाही"], c: 0 },
        { q: "अंकगणित: १०० - ३० = ?", a: ["७०", "८०", "६०", "९०"], c: 0 },
        { q: "सर्वात मोठे रेल्वे जंक्शन कोणते?", a: ["मथुरा", "मुंबई", "दिल्ली", "नागपूर"], c: 0 },
        { q: "रेल्वे कर्मचारी प्रशिक्षण संस्था कुठे आहे?", a: ["वडोदरा", "मुंबई", "दिल्ली", "पुणे"], c: 0 },
        { q: "बुद्धिमत्ता: १०, २०, ३०, ४०, ?", a: ["५०", "६०", "५५", "४५"], c: 0 }
    ];

    let currentQ = 0;
    let score = 0;

    function showQ() {
        if(currentQ >= questions.length) {
            document.querySelector('.box').innerHTML = `<div style="text-align:center;"><h2>परीक्षा संपली!</h2><p style="font-size: 1.5rem;">तुझा स्कोर: ${score} / ${questions.length}</p><button onclick="location.reload()">पुन्हा सुरू करा</button></div>`;
            return;
        }
        document.getElementById('q-text').innerText = (currentQ + 1) + ". " + questions[currentQ].q;
        let optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        questions[currentQ].a.forEach((opt, index) => {
            let btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => { 
                if(index === questions[currentQ].c) score++;
                currentQ++; 
                showQ();
            };
            optDiv.appendChild(btn);
        });
    }
    showQ();
</script>
</body>
</html>
