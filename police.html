<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>विवेकानंद अकॅडमी</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
        .q { font-size: 20px; margin-bottom: 15px; }
        button { display: block; width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center; color:#d32f2f;">विवेकानंद अकॅडमी</h2>
    <div id="q-text" class="q">प्रश्न लोड होत आहे...</div>
    <div id="options"></div>
</div>

<script>
    const questions = [
        { q: "भारतीय लष्कराचे सर्वोच्च कमांडर कोण असतात?", a: ["राष्ट्रपती", "पंतप्रधान", "संरक्षण मंत्री", "लष्कर प्रमुख"], c: 0 },
        { q: "‘अर्जुन’ हे काय आहे?", a: ["बॅटल टँक (युद्ध रणगाडा)", "विमान", "क्षेपणास्त्र", "हेलिकॉप्टर"], c: 0 },
        { q: "भारताचे पहिले संरक्षण मंत्री कोण होते?", a: ["बलदेव सिंग", "नेहरू", "सरदार पटेल", "झाकीर हुसेन"], c: 0 },
        { q: "अग्निवीर भरतीसाठीची वयोमर्यादा साधारणपणे किती असते?", a: ["१७.५ ते २१ वर्षे", "१८ ते २५ वर्षे", "२० ते २८ वर्षे", "१८ ते ३० वर्षे"], c: 0 },
        { q: "विज्ञानाचा प्रश्न: मानवी शरीरातील रक्तातील हिमोग्लोबिनसाठी कोणता घटक महत्त्वाचा आहे?", a: ["लोह (Iron)", "कॅल्शियम", "सोडियम", "पोटॅशियम"], c: 0 },
        { q: "अंकगणित: ५० चे २० टक्के किती?", a: ["१०", "२०", "५", "१५"], c: 0 },
        { q: "शिवाजी महाराजांच्या आरमाराला काय म्हटले जायचे?", a: ["भारतीय नौदलाचे जनक", "पायदळ", "वायूदल", "काही नाही"], c: 0 },
        { q: "इलेक्ट्रिक करंट मोजण्यासाठी काय वापरतात?", a: ["अँपिअर", "व्होल्ट", "ओहम", "वॉट"], c: 0 },
        { q: "भारताचे 'मिसाईल मॅन' कोणाला म्हणतात?", a: ["ए.पी.जे. अब्दुल कलाम", "होमी भाभा", "विक्रम साराभाई", "सी.व्ही. रामन"], c: 0 },
        { q: "बुद्धिमत्ता: २, ४, ६, ८, ?", a: ["१०", "१२", "१४", "१६"], c: 0 },
        { q: "सध्याचे भारताचे सैन्य प्रमुख (Army Chief) कोण आहेत?", a: ["जनरल उपेंद्र द्विवेदी", "मनोज पांडे", "विपिन रावत", "दलबीर सिंग"], c: 0 },
        { q: "अंकगणित: १० चा वर्ग किती?", a: ["१००", "२००", "५०", "१०"], c: 0 },
        { q: "पाण्याचे उकळण्याचे तापमान किती आहे?", a: ["१००°C", "९०°C", "११०°C", "८०°C"], c: 0 },
        { q: "भारताचा राष्ट्रीय प्राणी कोणता?", a: ["वाघ", "सिंह", "हत्ती", "घोडा"], c: 0 },
        { q: "बुद्धिमत्ता: 'सूर्य' पूर्वेला तर 'चंद्र' कोणत्या दिशेला मावळतो?", a: ["पश्चिम", "पूर्व", "दक्षिण", "उत्तर"], c: 0 },
        { q: "मानवी मेंदूचा मुख्य भाग कोणता जो शरीर संतुलित राखतो?", a: ["लहान मेंदू (Cerebellum)", "मोठा मेंदू", "मज्जारज्जू", "काही नाही"], c: 0 },
        { q: "अंकगणित: १२ x ९ किती?", a: ["१०८", "९८", "११८", "८८"], c: 0 },
        { q: "कॅन्सर उपचारासाठी कोणता किरण वापरतात?", a: ["कोबाल्ट-६०", "क्ष-किरण", "अल्ट्राव्हायोलेट", "इन्फ्रारेड"], c: 0 },
        { q: "भारताच्या तिन्ही सैन्यदलांचे मुख्यालय कोठे आहे?", a: ["नवी दिल्ली", "मुंबई", "पुणे", "कोलकाता"], c: 0 },
        { q: "बुद्धिमत्ता: ५, २५, १२५, ?", a: ["६२५", "२५०", "१००", "३००"], c: 0 },
        { q: "कोणत्या वायूला 'प्राणवायू' म्हणतात?", a: ["ऑक्सिजन", "नायट्रोजन", "हायड्रोजन", "कार्बन डायऑक्साइड"], c: 0 },
        { q: "अंकगणित: एका संख्येची निम्मी संख्या १० आहे, तर ती संख्या कोणती?", a: ["२०", "१०", "३०", "५"], c: 0 },
        { q: "लष्कराचा 'वीर चक्र' पुरस्कार कशासाठी दिला जातो?", a: ["युद्धातील शौर्य", "खेळ", "शिक्षण", "काही नाही"], c: 0 },
        { q: "विज्ञानाचा प्रश्न: बटाटा हे काय आहे?", a: ["खोड (Stem)", "मूळ", "फळ", "फूल"], c: 0 },
        { q: "बुद्धिमत्ता: ३, ६, ९, १२, ?", a: ["१५", "१८", "१३", "१४"], c: 0 },
        { q: "भारताचे संविधान कधी लागू झाले?", a: ["२६ जानेवारी १९५०", "१५ ऑगस्ट १९४७", "२६ नोव्हेंबर १९४९", "१ मे १९६०"], c: 0 },
        { q: "अंकगणित: १५ चा पाढा १० पर्यंत किती होतो?", a: ["१५०", "१४०", "१६०", "१२०"], c: 0 },
        { q: "जगात सर्वाधिक लोकसंख्या असलेला देश कोणता?", a: ["भारत", "चीन", "अमेरिका", "रशिया"], c: 0 },
        { q: "बुद्धिमत्ता: 'दही' पासून 'दूध' बनते का?", a: ["नाही", "हो", "काही वेळा", "सांगता येणार नाही"], c: 0 },
        { q: "लष्करी सरावाला काय म्हणतात?", a: ["मॅन्युव्हर (Maneuver)", "युद्ध", "कसरत", "काही नाही"], c: 0 },
        { q: "विज्ञानाचा प्रश्न: खायच्या सोडाचे रासायनिक नाव काय?", a: ["सोडियम बायकार्बोनेट", "सोडियम क्लोराईड", "कॅल्शियम कार्बोनेट", "काही नाही"], c: 0 },
        { q: "अंकगणित: ४ x ४ x ४ किती?", a: ["६४", "१६", "४८", "३२"], c: 0 },
        { q: "भारतीय नौदलाचा दिवस (Navy Day) कधी साजरा होतो?", a: ["४ डिसेंबर", "१५ ऑगस्ट", "२६ जानेवारी", "८ ऑक्टोबर"], c: 0 },
        { q: "बुद्धिमत्ता: १०, ८, ६, ४, ?", a: ["२", "०", "३", "१"], c: 0 },
        { q: "भारताचे 'लोहपुरुष' कोणाला म्हणतात?", a: ["सरदार पटेल", "गांधीजी", "नेहरू", "सावरकर"], c: 0 },
        { q: "सजीवांच्या शरीराची मूलभूत घटक काय आहे?", a: ["पेशी (Cell)", "रक्त", "हाडे", "स्नायू"], c: 0 },
        { q: "अंकगणित: १०० - ३५ = ?", a: ["६५", "७५", "५५", "८५"], c: 0 },
        { q: "भारतीय सैन्यदलाची 'मोटो' काय आहे?", a: ["सेवा परमो धर्म", "सत्यमेव जयते", "जय जवान", "काही नाही"], c: 0 },
        { q: "बुद्धिमत्ता: १ किमी म्हणजे किती मीटर?", a: ["१००० मीटर", "१०० मीटर", "५०० मीटर", "२००० मीटर"], c: 0 },
        { q: "जगातील सर्वात मोठा खंड कोणता?", a: ["आशिया", "आफ्रिका", "युरोप", "अमेरिका"], c: 0 }
    ];

    let currentQ = 0;
    function showQ() {
        document.getElementById('q-text').innerText = questions[currentQ].q;
        let optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        questions[currentQ].a.forEach((opt, i) => {
            let btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => { 
                currentQ++; 
                if(currentQ < questions.length) showQ();
                else alert('परीक्षा संपली!');
            };
            optDiv.appendChild(btn);
        });
    }
    showQ();
</script>

</body>
</html>
