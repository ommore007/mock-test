        {q:"९९. वाक्यप्रचार 'हात देणे' म्हणजे?", a:["मदत करणे", "मारणे", "काही नाही", "काही नाही"], c:0},
        {q:"१००. मराठी भाषेचे जननी?", a:["संस्कृत", "हिंदी", "इंग्रजी", "काही नाही"], c:0}
    ];

    let c = 0;
    function show() {
        document.getElementById('q-text').innerText = qs[c].q;
        document.getElementById('count').innerText = (c+1) + "/100";
        document.getElementById('sec').innerText = c < 25 ? "विभाग १: GK" : (c < 50 ? "विभाग २: गणित" : (c < 75 ? "विभाग ३: बुद्धिमत्ता" : "विभाग ४: मराठी"));
        let oDiv = document.getElementById('opts'); oDiv.innerHTML = '';
        qs[c].a.forEach(op => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = op;
            oDiv.appendChild(b);
        });
    }
    function next() { if(c < 99) { c++; show(); } }
    function prev() { if(c > 0) { c--; show(); } }
    show();
</script>
</body>
</html>
