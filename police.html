<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पोलीस भरती सराव प्रश्नसंच</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; display: flex; justify-content: center; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .q-text { font-size: 1.3rem; margin-bottom: 25px; font-weight: bold; color: #fbbf24; }
        button { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; background: #334155; color: white; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        button:hover { background: #d97706; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="text-align:center;">पोलीस भरती सराव (४० प्रश्न)</h3>
    <hr style="border: 0; border-top: 1px solid #475569; margin-bottom: 20px;">
    <div id="q-text" class="q-text">प्रश्न लोड होत आहे...</div>
    <div id="options"></div>
</div>

<script>
    const questions = [
        { q: "महाराष्ट्राचे सध्याचे पोलीस महासंचालक कोण आहेत?", a: ["रश्मी शुक्ला", "संजय बर्वे", "विवेक फणसळकर", "यापैकी नाही"], c: 0 },
        { q: "भारतीय संविधानाचे शिल्पकार कोणाला म्हणतात?", a: ["महात्मा गांधी", "डॉ. बाबासाहेब आंबेडकर", "जवाहरलाल नेहरू", "सरदार पटेल"], c: 1 },
        { q: "बुलढाणा जिल्ह्यात कोणते प्रसिद्ध सरोवर आहे?", a: ["लोणार", "पवई", "वेण्णा", "कास"], c: 0 },
        { q: "खालीलपैकी कोणता 'स्वर' आहे?", a: ["क", "प", "अ", "म"], c: 2 },
        { q: "एका वर्तुळाची त्रिज्या ७ सेमी असेल तर त्याचा परीघ किती?", a: ["४४ सेमी", "२२ सेमी", "१५४ सेमी", "८८ सेमी"], c: 0 },
        { q: "३५, ५०, ६५, ८०, ?", a: ["९०", "९५", "१००", "१०५"], c: 1 },
        { q: "खालीलपैकी कोणता जिल्हा 'नक्षलग्रस्त' म्हणून ओळखला जातो?", a: ["गडचिरोली", "सातारा", "पुणे", "नागपूर"], c: 0 },
        { q: "पोलीस स्मृतिदिन कधी साजरा केला जातो?", a: ["१५ ऑगस्ट", "२१ ऑक्टोबर", "२६ जानेवारी", "१ मे"], c: 1 },
        { q: "'राम आंबा खातो' या वाक्यातील प्रयोग कोणता?", a: ["कर्तरी", "कर्मणी", "भावे", "यापैकी नाही"], c: 0 },
        { q: "कोणत्या वर्षी मुंबई पोलीस आयुक्तपदाची निर्मिती झाली?", a: ["१९५०", "१९५५", "१९६०", "१९७०"], c: 0 },
        { q: "महाराष्ट्रातील 'उच्च न्यायालय' कुठे आहे?", a: ["पुणे", "मुंबई", "नागपूर", "औरंगाबाद"], c: 1 },
        { q: "अंकगणित: १५ चा वर्ग किती?", a: ["२२५", "२५५", "२०५", "१२५"], c: 0 },
        { q: "बुद्धिमत्ता: ५, १०, २०, ४०, ?", a: ["६०", "७०", "८०", "९०"], c: 2 },
        { q: "भारतीय दंड संहिता (IPC) कोणत्या वर्षी अस्तित्वात आली?", a: ["१८६०", "१८५७", "१९०१", "१९४७"], c: 0 },
        { q: "महाराष्ट्रातील कोणत्या जिल्ह्यात सर्वात जास्त वने आहेत?", a: ["गडचिरोली", "पुणे", "ठाणे", "रत्नागिरी"], c: 0 },
        { q: "समानार्थी शब्द: 'अरण्य' म्हणजे काय?", a: ["घर", "जंगल", "शेत", "गाव"], c: 1 },
        { q: "ध्वनीची तीव्रता मोजण्यासाठी कोणते एकक वापरतात?", a: ["डेसिबल", "हर्ट्झ", "वॅट", "मीटर"], c: 0 },
        { q: "पंचायतराज स्वीकारणारे पहिले राज्य कोणते?", a: ["राजस्थान", "महाराष्ट्र", "गुजरात", "पंजाब"], c: 0 },
        { q: "अंकगणित: १०० चे ५० टक्के किती?", a: ["२०", "४०", "५०", "८०"], c: 2 },
        { q: "बुद्धिमत्ता: A=२, B=४ तर C=?", a: ["५", "६", "७", "८"], c: 1 },
        { q: "महाराष्ट्रातील 'ताडोबा' हे राष्ट्रीय उद्यान कोणत्या जिल्ह्यात आहे?", a: ["चंद्रपूर", "नागपूर", "गोंदिया", "यवतमाळ"], c: 0 },
        { q: "मानवी शरीरात हाडांची संख्या किती असते?", a: ["२०६", "२०८", "२१२", "२००"], c: 0 },
        { q: "मराठी व्याकरण: 'सुर्योदय' या शब्दाचा संधी ओळखा.", a: ["सूर्य+उदय", "सुर्य+दय", "सु+दय", "काही नाही"], c: 0 },
        { q: "भारतीय रिझर्व्ह बँकेचे मुख्यालय कुठे आहे?", a: ["दिल्ली", "मुंबई", "कोलकाता", "चेन्नई"], c: 1 },
        { q: "महाराष्ट्रातील 'पठारी' प्रदेश कशाने बनला आहे?", a: ["बेसाल्ट", "ग्रॅनाइट", "चुनखडी", "वाळू"], c: 0 },
        { q: "बुद्धिमत्ता: २, ६, १२, २०, ?", a: ["२५", "३०", "३५", "४०"], c: 1 },
        { q: "विज्ञानाचा प्रश्न: कोणत्या वायूला 'प्राणवायू' म्हणतात?", a: ["नायट्रोजन", "हायड्रोजन", "ऑक्सिजन", "कार्बन डायऑक्साइड"], c: 2 },
        { q: "महाराष्ट्र पोलीस दलाचे ब्रीदवाक्य काय आहे?", a: ["सद्रक्षणाय खलनिग्रहणाय", "सत्यमेव जयते", "वंदे मातरम", "काही नाही"], c: 0 },
        { q: "अंकगणित: ९० चा ३०% किती?", a: ["२७", "३०", "२५", "३५"], c: 0 },
        { q: "मराठीतील 'आधुनिक कवितेचे जनक' कोणाला म्हणतात?", a: ["केशवसुत", "साने गुरुजी", "कुसुमाग्रज", "विंदा"], c: 0 },
        { q: "स्वतंत्र भारताचे पहिले गृहमंत्री कोण होते?", a: ["सरदार पटेल", "नेहरू", "आझाद", "गांधी"], c: 0 },
        { q: "बुद्धिमत्ता: ८, २७, ६४, ?", a: ["८१", "१००", "१२५", "१२१"], c: 2 },
        { q: "महाराष्ट्राचे 'राज्य फुल' कोणते?", a: ["कमळ", "जाई", "झेंडू", "गुलाब"], c: 1 },
        { q: "पाण्याच्या रेणूचे सूत्र काय?", a: ["H2O", "CO2", "O2", "NaCl"], c: 0 },
        { q: "अंकगणित: ५०+५०×० = ?", a: ["५०", "०", "१००", "२५"], c: 0 },
        { q: "जिल्ह्यातील 'पोलीस अधीक्षक' (SP) यांची नियुक्ती कोण करते?", a: ["UPSC", "MPSC", "राज्यपाल", "मुख्यमंत्री"], c: 0 },
        { q: "मराठी व्याकरण: 'नाम' म्हणजे काय?", a: ["एखादी वस्तू", "क्रिया", "गुण", "काही नाही"], c: 0 },
        { q: "भारताचे 'मिसाईल मॅन' कोणाला म्हणतात?", a: ["अब्दुल कलाम", "होमी भाभा", "विक्रम साराभाई", "काही नाही"], c: 0 },
        { q: "बुद्धिमत्ता: ७, १४, २१, २८, ?", a: ["३५", "३२", "३६", "३८"], c: 0 },
        { q: "पोलीस भरती लेखी परीक्षा किती गुणांची असते? (सामान्यतः)", a: १००, b: ८०, c: ९०, d: १२०, c: 0 }
    ];

    let currentQ = 0;
    let score = 0;

    function showQ() {
        if(currentQ >= questions.length) {
            document.querySelector('.box').innerHTML = `<div style="text-align:center;"><h2>परीक्षा संपली!</h2><p style="font-size: 1.5rem;">तुझा एकूण स्कोर: ${score} / ${questions.length}</p><button onclick="location.reload()">पुन्हा परीक्षा द्या</button></div>`;
            return;
        }
        document.getElementById('q-text').innerText = (currentQ + 1) + ". " + questions[currentQ].q;
        let optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        questions[currentQ].a.forEach((opt, index) => {
            let btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => { 
                if(index === questions[currentQ].c) score++;
                currentQ++; 
                showQ();
            };
            optDiv.appendChild(btn);
        });
    }
    showQ();
</script>
</body>
</html>
