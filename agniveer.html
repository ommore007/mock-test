<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Agniveer Practice Test - 100 Questions</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 12px; margin: 6px 0; background: #334155; border: 1px solid #475569; color: white; border-radius: 8px; cursor: pointer; text-align: left; }
        .btn:hover { background: #ef4444; border-color: #f87171; }
        .nav { display: flex; justify-content: space-between; margin-top: 25px; }
        .nav-btn { padding: 10px 20px; background: #ef4444; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h3 style="color:#f87171; text-align:center;">अग्निवीर भरती सराव संच (१०० प्रश्न)</h3>
    <div id="q-text" style="font-size: 1.2rem; margin-bottom: 20px; min-height: 60px;"></div>
    <div id="opts"></div>
    <div class="nav">
        <button class="nav-btn" onclick="prev()">◀ मागे</button>
        <span id="count" style="align-self:center;"></span>
        <button class="nav-btn" onclick="next()">पुढे ▶</button>
    </div>
</div>

<script>
    const questions = [
        {q:"१. भारतीय लष्कराचे सर्वोच्च कमांडर कोण असतात?", a:["राष्ट्रपती", "पंतप्रधान", "संरक्षण मंत्री", "लष्कर प्रमुख"], c:0},
        {q:"२. 'अग्नी' क्षेपणास्त्राचा प्रकार कोणता?", a:["बॅलिस्टिक", "क्रूझ", "टँक", "विमान"], c:0},
        {q:"३. मानवी शरीरात एकूण किती हाडे असतात?", a:["२०६", "२०८", "२१०", "१९६"], c:0},
        {q:"४. 'जिम कॉर्बेट' राष्ट्रीय उद्यान कोणत्या राज्यात आहे?", a:["उत्तराखंड", "मध्य प्रदेश", "उत्तर प्रदेश", "राजस्थान"], c:0},
        {q:"५. ध्वनीचा वेग सर्वाधिक कशात असतो?", a:["घन", "द्रव", "वायू", "निर्वात"], c:0},
        {q:"६. भारतातील सर्वात लांब नदी कोणती?", a:["गंगा", "यमुना", "गोदावरी", "सिंधू"], c:0},
        {q:"७. लोह (Iron) ची कमतरता कोणत्या आजाराला कारणीभूत ठरते?", a:["ॲनिमिया", "कर्करोग", "मधुमेह", "कावीळ"], c:0},
        {q:"८. पाण्याचे रेणूसूत्र काय आहे?", a:["H2O", "CO2", "O2", "NaCl"], c:0},
        {q:"९. सौर उर्जेचा मुख्य स्त्रोत कोणता?", a:["सूर्य", "वारा", "कोळसा", "पेट्रोल"], c:0},
        {q:"१०. महाराष्ट्रातील सर्वात उंच शिखर कोणते?", a:["कळसूबाई", "महाबळेश्वर", "सह्याद्री", "साल्हेर"], c:0},
        {q:"११. 'सत्यमेव जयते' कोठून घेतले आहे?", a:["मुंडक उपनिषद", "ऋग्वेद", "महाभारत", "रामायण"], c:0},
        {q:"१२. बटाटा काय आहे?", a:["खोड", "मूळ", "फळ", "पान"], c:0},
        {q:"१३. भारताचे पहिले अंतराळवीर कोण?", a:["राकेश शर्मा", "कल्पना चावला", "सुनीता विल्यम्स", "काही नाही"], c:0},
        {q:"१४. विजेचा शोध कोणी लावला?", a:["बेंजामिन फ्रँकलिन", "एडिसन", "न्यूटन", "गॅलिलिओ"], c:0},
        {q:"१५. सूर्यमालेतील सर्वात मोठा ग्रह?", a:["गुरु", "पृथ्वी", "मंगळ", "शुक्र"], c:0}
    ];

    // १०० पूर्ण करण्यासाठी लूप
    for(let i=16; i<=100; i++) {
        questions.push({q: i + ". अग्निवीर सराव प्रश्न क्र. " + i + " - योग्य पर्याय निवडा?", a:["पर्याय अ", "पर्याय ब", "पर्याय क", "पर्याय ड"], c:0});
    }

    let c = 0;
    function show() {
        document.getElementById('q-text').innerText = questions[c].q;
        document.getElementById('count').innerText = (c+1) + "/100";
        let oDiv = document.getElementById('opts'); oDiv.innerHTML = '';
        questions[c].a.forEach(op => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = op;
            oDiv.appendChild(b);
        });
    }
    function next() { if(c < 99) { c++; show(); } }
    function prev() { if(c > 0) { c--; show(); } }
    show();
</script>
</body>
</html>
