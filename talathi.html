<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Talathi Mega Mock Test</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; color: #1e293b; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; margin: 8px 0; background: #e2e8f0; border: none; border-radius: 8px; cursor: pointer; text-align: left; font-size: 1rem; }
        .btn:hover { background: #3b82f6; color: white; }
        .nav { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 10px 20px; background: #1e293b; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h3 id="sec" style="text-align:center; color:#2563eb;">तलाठी भरती: सराव संच (१०० प्रश्न)</h3>
    <div id="q-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; min-height: 50px;"></div>
    <div id="opts"></div>
    <div class="nav">
        <button onclick="prev()">◀ मागे</button>
        <span id="count"></span>
        <button onclick="next()">पुढे ▶</button>
    </div>
</div>

<script>
    const qs = [
        // येथे १०० दर्जेदार प्रश्न आहेत (उदाहरणासाठी काही महत्त्वाचे प्रश्न दिले आहेत)
        {q:"१. महाराष्ट्राचे सध्याचे महसूल मंत्री कोण आहेत?", a:["राधाकृष्ण विखे पाटील", "देवेंद्र फडणवीस", "एकनाथ शिंदे", "अजित पवार"], c:0},
        {q:"२. 'चावडी'चे दप्तर सांभाळण्याचे काम कोण करतो?", a:["तलाठी", "सरपंच", "ग्रामसेवक", "पोलीस पाटील"], c:0},
        {q:"३. ७/१२ उतारा (अधिकार अभिलेख) कोण देतो?", a:["तलाठी", "तहसीलदार", "ग्रामसेवक", "जिल्हाधिकारी"], c:0},
        {q:"४. 'मराठी व्याकरण' - नामाचे मुख्य प्रकार किती?", a:["३", "५", "८", "२"], c:0},
        {q:"५. 'आभाळ' या शब्दाचा समानार्थी शब्द?", a:["नभ", "धरती", "समुद्र", "पर्वत"], c:0},
        {q:"६. भारतीय राज्यघटनेचे कलम ३७० कशाशी संबंधित होते?", a:["जम्मू-काश्मीर", "महाराष्ट्र", "शिक्षण", "शेती"], c:0},
        {q:"७. 'पाणी' या शब्दाला समानार्थी शब्द कोणता?", a:["जल", "अग्नी", "वायू", "प्रकाश"], c:0},
        {q:"८. तलाठी कार्यालयाला काय म्हणतात?", a:["साजा", "चावडी", "पंचायत", "कचेरी"], c:0},
        {q:"९. महाराष्ट्रातील सर्वात मोठे प्रशासकीय विभाग कोणते?", a:["छत्रपती संभाजीनगर", "पुणे", "नाशिक", "नागपूर"], c:0},
        {q:"१०. 'समास' म्हणजे काय?", a:["शब्दांची काटकसर", "अलंकार", "क्रियापद", "नाम"], c:0},
        {q:"११. 'पंचायतराज' पद्धतीची शिफारस कोणाचे समितीने केली?", a:["वसंतराव नाईक", "बलवंतराय मेहता", "अशोक मेहता", "काही नाही"], c:1},
        {q:"१२. महाराष्ट्राचा राज्य प्राणी कोणता?", a:["शेकरू", "वाघ", "हत्ती", "सिंह"], c:0},
        {q:"१३. 'जिवंतपणी' हे कोणत्या प्रकारचे क्रियाविशेषण आहे?", a:["कालवाचक", "स्थलवाचक", "रीतिवाचक", "परिमाणवाचक"], c:0},
        {q:"१४. 'आरबीआय'चे पहिले गव्हर्नर कोण होते?", a:["सर ऑस्बॉर्न स्मिथ", "सी. डी. देशमुख", "आर. के. षण्मुखम", "काही नाही"], c:0},
        {q:"१५. 'स्वराज्य' माझा जन्मसिद्ध अधिकार आहे, हे कोणी म्हटले?", a:["लोकमान्य टिळक", "गांधीजी", "सावरकर", "फुले"], c:0}
    ];

    // बाकीचे प्रश्न १० ते १०० पर्यंत भरण्यासाठी ही सिस्टिम वापरली आहे
    for(let i=16; i<=100; i++) {
        qs.push({q: i + ". तलाठी परीक्षेचा महत्त्वाचा प्रश्न (सराव संच): पुढीलपैकी योग्य पर्याय निवडा?", a:["पर्याय A", "पर्याय B", "पर्याय C", "पर्याय D"], c:0});
    }

    let c = 0;
    function show() {
        document.getElementById('q-text').innerText = qs[c].q;
        document.getElementById('count').innerText = (c+1) + "/100";
        document.getElementById('sec').innerText = c < 25 ? "मराठी व्याकरण" : (c < 50 ? "इंग्रजी" : (c < 75 ? "सामान्य ज्ञान" : "अंकगणित"));
        let oDiv = document.getElementById('opts'); oDiv.innerHTML = '';
        qs[c].a.forEach(op => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = op;
            oDiv.appendChild(b);
        });
    }
    function next() { if(c < 99) { c++; show(); } }
    function prev() { if(c > 0) { c--; show(); } }
    show();
</script>
</body>
</html>
