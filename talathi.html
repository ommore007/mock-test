<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Talathi Mega Test - 100 Questions</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #111827; color: white; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1f2937; padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 12px; margin: 6px 0; background: #374151; color: white; border: none; border-radius: 8px; cursor: pointer; text-align: left; }
        .btn:hover { background: #4f46e5; }
        .nav { display: flex; justify-content: space-between; margin-top: 25px; }
        .nav-btn { padding: 10px 20px; background: #4f46e5; border: none; border-radius: 5px; color: white; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h3 id="sec" style="color:#fbbf24; text-align:center;">तलाठी भरती सराव संच - १०० प्रश्न</h3>
    <div id="q-text" style="font-size: 1.2rem; margin-bottom: 20px; min-height: 50px;"></div>
    <div id="opts"></div>
    <div class="nav">
        <button class="nav-btn" onclick="prev()">◀ मागे</button>
        <span id="count" style="align-self:center;"></span>
        <button class="nav-btn" onclick="next()">पुढे ▶</button>
    </div>
</div>

<script>
    const qs = [];
    // इथे मी १०० प्रश्न जनरेट करत आहे
    for(let i=1; i<=100; i++) {
        qs.push({
            q: i + ". तलाठी सराव प्रश्न क्रमांक " + i + ": योग्य पर्याय निवडा?",
            a: ["पर्याय अ", "पर्याय ब", "पर्याय क", "पर्याय ड"],
            c: 0
        });
    }

    let c = 0;
    function show() {
        document.getElementById('q-text').innerText = qs[c].q;
        document.getElementById('count').innerText = (c+1) + "/100";
        let oDiv = document.getElementById('opts'); oDiv.innerHTML = '';
        qs[c].a.forEach(op => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = op;
            oDiv.appendChild(b);
        });
    }
    function next() { if(c < 99) { c++; show(); } }
    function prev() { if(c > 0) { c--; show(); } }
    show();
</script>
</body>
</html>
