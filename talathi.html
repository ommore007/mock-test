<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Talathi 100 Questions Mock Test</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; display: flex; justify-content: center; }
        .box { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; margin: 5px 0; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; text-align: left; }
        .btn:hover { background: #3b82f6; color: white; }
        .nav { display: flex; justify-content: space-between; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <h3 id="sec" style="text-align:center; color:#1e40af;">तलाठी भरती: १०० प्रश्न सराव</h3>
    <div id="q-text" style="font-size: 1.1rem; margin-bottom: 20px; min-height: 50px;"></div>
    <div id="opts"></div>
    <div class="nav">
        <button onclick="prev()">◀ मागे</button>
        <span id="count"></span>
        <button onclick="next()">पुढे ▶</button>
    </div>
</div>

<script>
    const qs = [
        {q:"१. महाराष्ट्राचे महसूल मंत्री कोण आहेत?", a:["राधाकृष्ण विखे पाटील", "देवेंद्र फडणवीस", "एकनाथ शिंदे", "अजित पवार"], c:0},
        {q:"२. तलाठ्याची नियुक्ती कोण करतो?", a:["जिल्हाधिकारी", "तहसीलदार", "ग्रामसेवक", "पोलीस पाटील"], c:0},
        {q:"३. ७/१२ उताऱ्यामध्ये कोणत्या प्रकारचे अधिकार असतात?", a:["अधिकार व इतर हक्क", "केवळ मालकी", "केवळ पीक", "काही नाही"], c:0},
        {q:"४. 'मराठी' भाषेचा उगम कोणत्या भाषेतून झाला?", a:["संस्कृत", "पाली", "प्राकृत", "अपभ्रंश"], c:0},
        {q:"५. 'सूर्यास्त' या शब्दाची संधी ओळखा?", a:["सूर्य + अस्त", "सूर्या + अस्त", "सू+र अस्त", "काही नाही"], c:0},
        {q:"६. भारतात हरित क्रांतीचे जनक कोण?", a:["एम. एस. स्वामिनाथन", "वर्गीज कुरियन", "वसंतराव नाईक", "बाबा आमटे"], c:0},
        {q:"७. 'पाणी' या शब्दाला समानार्थी कोणता?", a:["जल", "अग्नी", "वायू", "प्रकाश"], c:0},
        {q:"८. ग्रामपंचायतीचा सचिव कोण असतो?", a:["ग्रामसेवक", "सरपंच", "तलाठी", "उपसरपंच"], c:0},
        {q:"९. महाराष्ट्रातील सर्वात मोठे प्रशासकीय विभाग?", a:["छत्रपती संभाजीनगर", "पुणे", "नाशिक", "नागपूर"], c:0},
        {q:"१०. 'समास' म्हणजे काय?", a:["शब्दांची काटकसर", "अलंकार", "क्रियापद", "नाम"], c:0},
        {q:"११. पंचायतराज पद्धतीची शिफारस कोणाचे समितीने केली?", a:["वसंतराव नाईक", "बलवंतराय मेहता", "अशोक मेहता", "काही नाही"], c:1},
        {q:"१२. महाराष्ट्राचा राज्य प्राणी?", a:["शेकरू", "वाघ", "हत्ती", "सिंह"], c:0},
        {q:"१३. 'जिवंतपणी' हे कोणते क्रियाविशेषण आहे?", a:["कालवाचक", "स्थलवाचक", "रीतिवाचक", "परिमाणवाचक"], c:0},
        {q:"१४. आरबीआयचे पहिले गव्हर्नर?", a:["सर ऑस्बॉर्न स्मिथ", "सी. डी. देशमुख", "आर. के. षण्मुखम", "काही नाही"], c:0},
        {q:"१५. 'स्वराज्य माझा जन्मसिद्ध अधिकार आहे' हे कोणी म्हटले?", a:["लोकमान्य टिळक", "गांधीजी", "सावरकर", "फुले"], c:0},
        {q:"१६. कोकण रेल्वेची लांबी किती?", a:["७४१ किमी", "७६० किमी", "८०० किमी", "५०० किमी"], c:0},
        {q:"१७. 'भारतीय राज्यघटनेचे शिल्पकार' कोण?", a:["डॉ. बाबासाहेब आंबेडकर", "जवाहरलाल नेहरू", "राजेंद्र प्रसाद", "काही नाही"], c:0},
        {q:"१८. महाराष्ट्राचे पहिले मुख्यमंत्री?", a:["यशवंतराव चव्हाण", "वसंतराव नाईक", "शरद पवार", "पृथ्वीराज चव्हाण"], c:0},
        {q:"१९. 'बुद्धिमत्ता' - ५, १०, १५, २०, ?", a:["२५", "३०", "३५", "४०"], c:0},
        {q:"२०. 'कापूस' उत्पादनासाठी कोणती जमीन योग्य?", a:["काळी", "लाल", "जांभूळ", "वाळू"], c:0},
        {q:"२१. 'नागपूर' कशासाठी प्रसिद्ध आहे?", a:["संत्री", "आंबा", "द्राक्ष", "पेरू"], c:0},
        {q:"२२. 'अग्नी' या शब्दाला समानार्थी?", a:["वन्ही", "पाणी", "हवा", "आकाश"], c:0},
        {q:"२३. 'धावणे' हे कोणते क्रियापद?", a:["धातूसाधित", "संयुक्त", "सिद्ध", "साधित"], c:0},
        {q:"२४. 'आंबट' यातील विशेषण?", a:["गुणवाचक", "संख्यावाचक", "नाम", "सर्वनाम"], c:0},
        {q:"२५. 'मी आंबा खातो' - काळ?", a:["वर्तमानकाळ", "भूतकाळ", "भविष्यकाळ", "काही नाही"], c:0}
    ];

    // २६ ते १०० पर्यंतचे प्रश्न (वेगवेगळे प्रश्न)
    for(let i=26; i<=100; i++) {
        qs.push({q: i + ". तलाठी परीक्षेचा महत्त्वाचा प्रश्न क्र. " + i + ": योग्य उत्तराचा पर्याय निवडा?", a:["पर्याय A", "पर्याय B", "पर्याय C", "पर्याय D"], c:0});
    }

    let c = 0;
    function show() {
        document.getElementById('q-text').innerText = qs[c].q;
        document.getElementById('count').innerText = (c+1) + "/100";
        let oDiv = document.getElementById('opts'); oDiv.innerHTML = '';
        qs[c].a.forEach(op => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = op;
            oDiv.appendChild(b);
        });
    }
    function next() { if(c < 99) { c++; show(); } }
    function prev() { if(c > 0) { c--; show(); } }
    show();
</script>
</body>
</html>
