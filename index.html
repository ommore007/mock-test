<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विवेकानंद करिअर अकॅडमी | सातारा</title>
    <!-- Modern Font: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #eef2f3; }
        
        /* Hero Section - Gradient & Modern Look */
        .hero-section { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; padding: 60px 20px; border-radius: 0 0 60px 60px; 
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
        }
        
        .hero-section img { 
            width: 140px; height: 140px; margin-bottom: 15px; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); 
        }

        /* Glassmorphism Cards */
        .course-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 25px; padding: 30px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        .course-card:hover { transform: scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        .btn-custom { 
            background: #ff7e5f; color: white; border: none; 
            border-radius: 50px; padding: 12px 30px; font-weight: 600; 
            transition: 0.3s;
        }
        .btn-custom:hover { background: #feb47b; color: white; }
    </style>
</head>
<body>

<!-- Hero Section -->
<div class="hero-section">
    <img src="https://i.postimg.cc/1X9N6t5T/1000693175.png" alt="Logo">
    <h1 class="fw-bold">विवेकानंद करिअर अकॅडमी</h1>
    <p class="text-white-50">#आम्ही_नाही_आमचा_निकाल_बोलतो</p>
</div>

<!-- Courses Grid -->
<div class="container py-5">
    <div class="row g-4 justify-content-center">
        <div class="col-6 col-md-3"><div class="course-card"><h5>पोलीस भरती</h5><a href="police.html" class="btn btn-custom w-100 mt-3">सुरू करा</a></div></div>
        <div class="col-6 col-md-3"><div class="course-card"><h5>तलाठी भरती</h5><a href="talathi.html" class="btn btn-custom w-100 mt-3">सुरू करा</a></div></div>
        <div class="col-6 col-md-3"><div class="course-card"><h5>रेल्वे भरती</h5><a href="railway.html" class="btn btn-custom w-100 mt-3">सुरू करा</a></div></div>
        <div class="col-6 col-md-3"><div class="course-card"><h5>अग्निवीर</h5><a href="agniveer.html" class="btn btn-custom w-100 mt-3">सुरू करा</a></div></div>
    </div>
</div>

</body>
</html>
