<html lang="mr">
<head>
<meta charset="UTF-8">

<title>पोलीस भरती महा-मॉक टेस्ट (100 प्रश्न)</title>

<style>
body {
    font-family: 'Arial', sans-serif;
    background: #eef2f5;
    padding: 20px;
    margin: 0;
}

.container {
    max-width: 750px;
    margin: 20px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #003366;
    margin-top: 0;
    font-size: 24px;
    border-bottom: 2px solid #003366;
    padding-bottom: 10px;
}

.quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    background: #f8f9fa;
    padding: 10px 15px;
    border-radius: 6px;
}

.category-badge {
    background: #003366;
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 14px;
}

.timer {
    font-size: 22px;
    font-weight: bold;
    color: #cc0000;
    font-family: monospace;
}

.question {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #222;
    line-height: 1.6;
}

.option {
    margin: 12px 0;
}

.option label {
    display: block;
    padding: 14px;
    border: 1px solid #ced4da;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s ease;
    background: #fff;
}

.option label:hover {
    background: #e6f2ff;
    border-color: #003366;
}

.option input[type="radio"] {
    margin-right: 12px;
    transform: scale(1.3);
    vertical-align: middle;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 20px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    width: 100%;
    transition: 0.2s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

button:hover {
    background: #1b5e20;
}

.result {
    text-align: center;
    padding: 20px 0;
}

.result h1 {
    font-size: 55px;
    color: #2e7d32;
    margin: 20px 0;
    border: none;
}

.score-percent {
    font-size: 26px;
    font-weight: bold;
    color: #444;
    margin-bottom: 30px;
}

.review-section {
    text-align: left;
    margin-top: 40px;
    border-top: 2px dashed #ccc;
    padding-top: 20px;
}

.review-item {
    background: #f9f9f9;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    border-left: 5px solid #ccc;
}

.review-item.correct {
    border-left-color: #2e7d32;
    background: #e8f5e9;
}

.review-item.wrong {
    border-left-color: #c62828;
    background: #ffebee;
}

.review-q {
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 8px;
}

.review-ans {
    font-size: 16px;
    margin: 4px 0;
}
</style>
</head>

<body>

</div>
