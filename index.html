<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विवेकानंद करिअर अकॅडमी | सातारा</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; }
        
        /* सेलिब्रिटी स्टाईल हेडर */
        .hero { padding: 80px 20px; text-align: center; background: radial-gradient(circle at top, #1e293b, #0f172a); }
        .logo-box { width: 140px; height: 140px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 30px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); }
        .logo-box img { width: 100px; height: 100px; object-fit: contain; }
        
        /* प्रीमियम कार्ड्स */
        .card-custom { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 25px; transition: 0.4s; }
        .card-custom:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        
        .btn-celebrity { background: linear-gradient(to right, #6366f1, #a855f7); border: none; padding: 12px 30px; border-radius: 50px; color: white; font-weight: 600; transition: 0.3s; }
        .btn-celebrity:hover { transform: scale(1.05); color: white; }
    </style>
</head>
<body>

<div class="hero">
    <div class="logo-box">
        <img src="https://i.postimg.cc/1X9N6t5T/1000693175.png" alt="Logo">
    </div>
    <h1 class="fw-bold">विवेकानंद करिअर अकॅडमी</h1>
    <p class="text-secondary">#आम्ही_नाही_आमचा_निकाल_बोलतो</p>
</div>

<div class="container py-5">
    <div class="row g-4">
        <div class="col-6 col-md-3">
            <div class="card-custom text-center">
                <h5>पोलीस भरती</h5>
                <a href="police.html" class="btn btn-celebrity mt-3">सुरू करा</a>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card-custom text-center">
                <h5>तलाठी भरती</h5>
                <a href="talathi.html" class="btn btn-celebrity mt-3">सुरू करा</a>
            </div>
        </div>
        </div>
</div>

</body>
</html>
