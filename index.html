<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पोलीस भरती महा-मॉक टेस्ट</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🚔 पोलीस भरती संपूर्ण ऑनलाईन सराव परीक्षा</h1>
    
    <div class="quiz-header">
        <div id="category" class="category-badge">विषय: लोड होत आहे...</div>
        <div class="timer">⏱️ वेळ: <span id="timer">90:00</span></div>
    </div>

    <div id="quiz-box">
        <!-- डावा भाग: प्रश्न आणि पर्याय -->
        <div class="quiz-main">
            <div id="question" class="question">प्रश्न लोड होत आहेत...</div>
            <div id="options"></div>
            
            <div class="nav-buttons">
                <button id="prev-btn" onclick="prevQuestion()">⬅️ मागे (Prev)</button>
                <button id="next-btn" onclick="nextQuestion()">पुढील (Next) ➡️</button>
            </div>
        </div>

        <!-- उजवा भाग: १ ते १०० प्रश्नांचे बॉक्स (फक्त मोठ्या स्क्रीनवर दिसेल) -->
        <div class="quiz-sidebar">
            <h3>प्रश्न तालिका</h3>
            <div id="question-palette" class="palette"></div>
            <button id="submit-exam-btn" onclick="showResults()" style="background: #c62828;">परीक्षा सबमिट करा 🛑</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
